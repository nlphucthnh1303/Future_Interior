# PostgreSQL profile for local development
spring.datasource.url=jdbc:postgresql://localhost:5432/futureinterior
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Let Hibernate create/update tables from entities for initial run
spring.jpa.hibernate.ddl-auto=update
# Use this profile to avoid interfering with existing SQL Server config
# Activate with: -Dspring.profiles.active=postgres
